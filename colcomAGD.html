<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colcom Ammonia Monitoring System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#000,#2a0000,#000);
    color:white;
}

.container {
    max-width:1400px;
    margin:auto;
    padding:20px;
}

h1 {
    text-align:center;
    color:#ff2e2e;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card {
    background:rgba(0,0,0,0.7);
    border:1px solid #550000;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.value {
    font-size:24px;
    color:#ff4d4d;
}

/* STATUS */
.normal { color:#00ff88; }
.warning { color:#ffcc00; }
.danger { color:red; animation: blink 1s infinite; }

@keyframes blink { 50% {opacity:0.4;} }

/* CONTROLS */
.controls {
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:15px;
}

input, select, button {
    padding:8px;
    border-radius:5px;
    border:none;
}

/* ALERT */
.alert {
    background:rgba(0,0,0,0.8);
    border:1px solid #770000;
    padding:15px;
    border-radius:10px;
}

/* CHART GRID */
.charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.chart-card {
    background: rgba(0,0,0,0.7);
    border: 1px solid #550000;
    border-radius: 12px;
    padding: 15px;
}

.chart-card h3 {
    margin-bottom: 10px;
    color: #ff4d4d;
}

.chart-card canvas {
    width: 100% !important;
    height: 250px !important;
}
</style>
</head>

<body>

<div class="container">

<h1>Colcom Foods - Ammonia Gas Monitoring System</h1>

<!-- REAL-TIME -->
<div class="grid">
    <div class="card"><h3>Current PPM</h3><div id="ppm" class="value">0</div></div>
    <div class="card"><h3>Status</h3><div id="status" class="value normal">NORMAL</div></div>
    <div class="card"><h3>Criticality</h3><div id="critical" class="value normal">LOW</div></div>
    <div class="card"><h3>Trend</h3><div id="trend" class="value">Stable</div></div>
</div>

<div class="alert">
    <h3>Live Alerts</h3>
    <p id="alertText">System Initializing...</p>
</div>

<!-- CONTROLS -->
<div class="controls">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <select id="groupBy">
        <option value="day">Daily</option>
        <option value="week">Weekly</option>
        <option value="month">Monthly</option>
    </select>
    <button onclick="updateDashboard()">Apply</button>
</div>

<!-- ANALYTICS -->
<div class="grid">
    <div class="card"><h3>Average</h3><div id="avg" class="value">0</div></div>
    <div class="card"><h3>Max</h3><div id="max" class="value">0</div></div>
    <div class="card"><h3>Min</h3><div id="min" class="value">0</div></div>
    <div class="card"><h3>Exposure Index</h3><div id="exposure" class="value">0</div></div>
    <div class="card"><h3>Danger Duration</h3><div id="dangerTime" class="value">0s</div></div>
</div>

<!-- CHARTS -->
<div class="charts-grid">

    <div class="chart-card">
        <h3>Trend (Average PPM)</h3>
        <canvas id="trendChart"></canvas>
    </div>

    <div class="chart-card">
        <h3>Comparison</h3>
        <canvas id="barChart"></canvas>
    </div>

    <div class="chart-card">
        <h3>Risk Distribution</h3>
        <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-card">
        <h3>Min vs Max</h3>
        <canvas id="rangeChart"></canvas>
    </div>

</div>

</div>

<script>
let readings = [];
let fullData = JSON.parse(localStorage.getItem("gasData")) || [];

/* SIMULATION */
function simulateData() {
    setInterval(() => {
        let ppm = Math.floor(Math.random()*120);
        let now = new Date();

        readings.push(ppm);
        if (readings.length > 10) readings.shift();

        fullData.push({time: now.toISOString(), ppm});
        localStorage.setItem("gasData", JSON.stringify(fullData));

        updateRealtime(ppm);
    }, 2000);
}
simulateData();

/* REAL-TIME */
function updateRealtime(ppm) {
    document.getElementById("ppm").innerText = ppm;

    let statusEl = document.getElementById("status");
    let criticalEl = document.getElementById("critical");
    let alert = document.getElementById("alertText");

    if (ppm < 50) {
        statusEl.innerText = "NORMAL";
        statusEl.className = "value normal";
        criticalEl.innerText = "LOW";
        criticalEl.className = "value normal";
        alert.innerText = "Safe ammonia levels.";
    } else if (ppm < 80) {
        statusEl.innerText = "WARNING";
        statusEl.className = "value warning";
        criticalEl.innerText = "MEDIUM";
        criticalEl.className = "value warning";
        alert.innerText = "Moderate ammonia detected.";
    } else {
        statusEl.innerText = "DANGER";
        statusEl.className = "value danger";
        criticalEl.innerText = "CRITICAL";
        criticalEl.className = "value danger";
        alert.innerText = "HIGH AMMONIA! Immediate action required!";
    }

    if (readings.length > 2) {
        let last = readings[readings.length-1];
        let prev = readings[readings.length-2];

        let trend = "Stable";
        if (last > prev) trend = "Rising ↑";
        else if (last < prev) trend = "Falling ↓";

        document.getElementById("trend").innerText = trend;
    }
}

/* FILTER */
function filterData(start, end) {
    return fullData.filter(r => {
        let t = new Date(r.time);
        return (!start || t>=start) && (!end || t<=end);
    });
}

/* GROUP */
function groupData(data, type) {
    let grouped = {};

    data.forEach(r=>{
        let d = new Date(r.time);
        let key;

        if (type==="day") key = d.toISOString().slice(0,10);
        else if (type==="week") key = d.getFullYear()+"-W"+Math.ceil(d.getDate()/7);
        else key = d.getFullYear()+"-"+(d.getMonth()+1);

        if (!grouped[key]) grouped[key]=[];
        grouped[key].push(r.ppm);
    });

    return Object.keys(grouped).map(k=>{
        let vals = grouped[k];
        return {
            label:k,
            avg: vals.reduce((a,b)=>a+b,0)/vals.length,
            min: Math.min(...vals),
            max: Math.max(...vals)
        };
    });
}

/* ANALYTICS */
function computeStats(data) {
    if (data.length === 0) return;

    let ppm = data.map(d=>d.ppm);

    document.getElementById("avg").innerText = (ppm.reduce((a,b)=>a+b,0)/ppm.length).toFixed(1);
    document.getElementById("max").innerText = Math.max(...ppm);
    document.getElementById("min").innerText = Math.min(...ppm);

    document.getElementById("exposure").innerText = ppm.reduce((s,v)=>s+v,0);
    document.getElementById("dangerTime").innerText = data.filter(d=>d.ppm>80).length * 2 + "s";
}

/* CHARTS */
let trendChart, barChart, pieChart, rangeChart;

function drawCharts(grouped, raw) {

    [trendChart, barChart, pieChart, rangeChart].forEach(c=>{ if(c) c.destroy(); });

    trendChart = new Chart(document.getElementById("trendChart"), {
        type:"line",
        data:{
            labels: grouped.map(d=>d.label),
            datasets:[{label:"Avg PPM", data: grouped.map(d=>d.avg), borderColor:"red"}]
        }
    });

    barChart = new Chart(document.getElementById("barChart"), {
        type:"bar",
        data:{
            labels: grouped.map(d=>d.label),
            datasets:[{label:"Avg PPM", data: grouped.map(d=>d.avg), backgroundColor:"rgba(255,0,0,0.5)"}]
        }
    });

    let safe = raw.filter(d=>d.ppm<50).length;
    let warn = raw.filter(d=>d.ppm>=50 && d.ppm<80).length;
    let danger = raw.filter(d=>d.ppm>=80).length;

    pieChart = new Chart(document.getElementById("pieChart"), {
        type:"pie",
        data:{
            labels:["Safe","Warning","Danger"],
            datasets:[{data:[safe,warn,danger]}]
        }
    });

    rangeChart = new Chart(document.getElementById("rangeChart"), {
        type:"line",
        data:{
            labels: grouped.map(d=>d.label),
            datasets:[
                {label:"Max", data: grouped.map(d=>d.max), borderColor:"red"},
                {label:"Min", data: grouped.map(d=>d.min), borderColor:"orange"}
            ]
        }
    });
}

/* UPDATE */
function updateDashboard() {
    let start = document.getElementById("startDate").value;
    let end = document.getElementById("endDate").value;
    let groupBy = document.getElementById("groupBy").value;

    let filtered = filterData(start?new Date(start):null, end?new Date(end):null);
    if (filtered.length === 0) return;

    computeStats(filtered);
    let grouped = groupData(filtered, groupBy);
    drawCharts(grouped, filtered);
}

updateDashboard();
</script>

</body>
</html>
